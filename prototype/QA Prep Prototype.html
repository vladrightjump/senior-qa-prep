<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>QA Prep — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&amp;family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&amp;family=Instrument+Sans:ital,wght@0,400..700;1,400..700&amp;family=Caveat:wght@400..600&amp;display=swap" rel="stylesheet" />
<link rel="stylesheet" href="qa-prototype/proto-styles.css" />
<link rel="stylesheet" href="qa-prototype/proto-styles-2.css" />
<link rel="stylesheet" href="qa-prototype/proto-styles-notion.css" />
<link rel="stylesheet" href="qa-prototype/proto-styles-modern.css" />
<link rel="stylesheet" href="qa-prototype/proto-anim.css" />
<link rel="stylesheet" href="qa-prototype/proto-responsive.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="qa-prototype/proto-data.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="qa-prototype/proto-ui.jsx"></script>
<script type="text/babel" src="qa-prototype/proto-home.jsx"></script>
<script type="text/babel" src="qa-prototype/proto-category.jsx"></script>
<script type="text/babel" src="qa-prototype/proto-focus.jsx"></script>
<script type="text/babel">
const STORE_KEY = "qa-proto-state-v1";

const ACCENTS = {
  "#a8553a": { deep: "#8c4530", soft: "#f2e2da", name: "Clay" },
  "#67743a": { deep: "#525e2c", soft: "#eef0df", name: "Olive" },
  "#c4683c": { deep: "#a85530", soft: "#f4e2d6", name: "Ember" },
  "#4a72a8": { deep: "#3a5c8c", soft: "#e9eff7", name: "Slate" },
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#c4683c",
  "style": "modern",
  "fieldNotes": false
}/*EDITMODE-END*/;

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
    if (raw) {
      return {
        reviewed: new Set(raw.reviewed || []),
        flagged: new Set(raw.flagged || []),
        openIds: new Set(raw.openIds || []),
        screen: raw.screen || "home",
        catId: raw.catId || "playwright-ts",
      };
    }
  } catch { /* fall through to seed */ }
  return {
    reviewed: new Set(window.PROTO_DATA.SEED_REVIEWED),
    flagged: new Set(window.PROTO_DATA.SEED_FLAGGED),
    openIds: new Set(["pw2"]),
    screen: "home",
    catId: "playwright-ts",
  };
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [state, setState] = React.useState(loadState);
  const [focusCat, setFocusCat] = React.useState(null);
  const searchRef = React.useRef(null);

  // Persist
  React.useEffect(() => {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({
        reviewed: [...state.reviewed],
        flagged: [...state.flagged],
        openIds: [...state.openIds],
        screen: state.screen,
        catId: state.catId,
      }));
    } catch { /* storage unavailable */ }
  }, [state]);

  // Apply accent tweak to CSS vars
  React.useEffect(() => {
    const a = ACCENTS[t.accent] || ACCENTS["#a8553a"];
    const r = document.documentElement.style;
    r.setProperty("--accent", t.accent);
    r.setProperty("--accent-deep", a.deep);
    r.setProperty("--accent-soft", a.soft);
  }, [t.accent]);

  const setReviewed = (id, value) => {
    setState((p) => {
      const next = new Set(p.reviewed);
      const on = value !== undefined ? value : !next.has(id);
      if (on) next.add(id); else next.delete(id);
      return { ...p, reviewed: next };
    });
  };
  const toggleFlag = (id) => {
    setState((p) => {
      const next = new Set(p.flagged);
      if (next.has(id)) next.delete(id); else next.add(id);
      return { ...p, flagged: next };
    });
  };
  const toggleOpen = (id) => {
    setState((p) => {
      const next = new Set(p.openIds);
      if (next.has(id)) next.delete(id); else next.add(id);
      return { ...p, openIds: next };
    });
  };
  const goHome = () => setState((p) => ({ ...p, screen: "home" }));
  const openCategory = (catId) => setState((p) => ({
    ...p, screen: "category",
    catId: catId === BOOKMARKS_ID ? catId : catId,
  }));
  const lastRealCat = state.catId === BOOKMARKS_ID ? "playwright-ts" : state.catId;

  // Global keys: "/" focuses search, Esc blurs
  React.useEffect(() => {
    const handler = (e) => {
      const el = e.target;
      const inField = el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.isContentEditable;
      if (e.key === "Escape" && inField) { el.blur(); return; }
      if (inField || focusCat) return;
      if (e.key === "/") {
        e.preventDefault();
        if (state.screen !== "category") openCategory(lastRealCat);
        requestAnimationFrame(() => { searchRef.current && searchRef.current.focus(); });
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  });

  const totalDone = state.reviewed.size;
  const pct = Math.round((totalDone / protoTotalCount) * 100);

  return (
    <div className="app" data-style={t.style}>
      <header className="topbar">
        <button className="wordmark" onClick={goHome}>QA Prep</button>
        <span className="tagline">a field guide for the senior automation interview</span>
        <nav className="topnav" aria-label="Main">
          <button className={state.screen === "home" ? "active" : ""} onClick={goHome}>Home</button>
          <button className={state.screen === "category" && state.catId !== BOOKMARKS_ID ? "active" : ""} onClick={() => openCategory(lastRealCat)}>Browse</button>
          <button className={state.catId === BOOKMARKS_ID && state.screen === "category" ? "active" : ""} onClick={() => openCategory(BOOKMARKS_ID)}>
            Bookmarks<span className="count">{state.flagged.size}</span>
          </button>
        </nav>
        <span className="spacer"></span>
        <span className="topbar-progress"><strong>{totalDone}</strong> / {protoTotalCount} reviewed · {pct}%</span>
        <span className="topbar-bar"><span style={{ width: `${pct}%` }}></span></span>
      </header>

      {state.screen === "home" ? (
        <div data-screen-label="Home" style={{ display: "contents" }}>
          <HomeScreen
            reviewed={state.reviewed}
            lastCatId={lastRealCat}
            onOpenCategory={openCategory}
            onResume={openCategory}
          />
        </div>
      ) : (
        <div data-screen-label="Category" style={{ display: "contents" }}>
          <CategoryScreen
            catId={state.catId}
            reviewed={state.reviewed}
            flagged={state.flagged}
            openIds={state.openIds}
            fieldNotes={t.fieldNotes}
            searchRef={searchRef}
            onSelectCat={openCategory}
            onToggleOpen={toggleOpen}
            onToggleReviewed={(id) => setReviewed(id)}
            onToggleFlag={toggleFlag}
            onStartFocus={(catId) => setFocusCat(catId)}
          />
        </div>
      )}

      {focusCat && (
        <div data-screen-label="Focus session" style={{ display: "contents" }}>
          <FocusSession
            catId={focusCat}
            reviewed={state.reviewed}
            flagged={state.flagged}
            onMarkReviewed={setReviewed}
            onToggleFlag={toggleFlag}
            onEnd={() => setFocusCat(null)}
          />
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="Style" />
        <TweakRadio
          label="Direction"
          value={t.style}
          options={["modern", "editorial", "notion"]}
          onChange={(v) => setTweak("style", v)}
        />
        <TweakSection label="Theme" />
        <TweakColor
          label="Accent"
          value={t.accent}
          options={Object.keys(ACCENTS)}
          onChange={(v) => setTweak("accent", v)}
        />
        {t.style !== "modern" && (
          <>
            <TweakSection label="Flavor" />
            <TweakToggle
              label="Field-notes touches"
              value={t.fieldNotes}
              onChange={(v) => setTweak("fieldNotes", v)}
            />
          </>
        )}
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
