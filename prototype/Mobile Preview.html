<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QA Prep — Mobile Preview</title>
<style>
  :root { --bg:#23211d; --frame:#0c0b0a; --dim:#8c8678; }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background:
      radial-gradient(120% 90% at 50% -10%, #2f2c26, var(--bg)) fixed;
    color: var(--dim);
    font-family: "Instrument Sans", ui-sans-serif, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 64px; gap: 30px; min-height: 100vh;
  }
  header { text-align: center; }
  header h1 { font-family: Georgia, serif; font-weight: 500; font-size: 22px; color: #ece6da; margin: 0 0 6px; letter-spacing: -0.01em; }
  header p { margin: 0; font-size: 13px; color: var(--dim); }
  .stage { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
  .device { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .device-cap { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim); }
  .phone {
    width: 390px; height: 844px; border-radius: 52px; background: var(--frame);
    padding: 13px; flex-shrink: 0;
    box-shadow: 0 0 0 2px #2c2a26, 0 40px 90px -30px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
  }
  .phone::before {
    content: ""; position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
    width: 112px; height: 30px; background: var(--frame); border-radius: 0 0 18px 18px; z-index: 3;
  }
  .phone iframe { width: 100%; height: 100%; border: 0; border-radius: 40px; background: #fff; display: block; }
  @media (max-width: 880px) {
    .phone { width: 320px; height: 692px; }
  }
</style>
</head>
<body>
<header>
  <h1>QA Prep — Mobile</h1>
  <p>Live prototype at 390 × 844. Tap to browse, open a question, launch a focus session, or open Contents.</p>
</header>
<div class="stage">
  <div class="device">
    <span class="device-cap">Home</span>
    <div class="phone"><iframe id="home" src="QA Prep Prototype.html" title="QA Prep mobile — Home"></iframe></div>
  </div>
  <div class="device">
    <span class="device-cap">Browse · Reading room</span>
    <div class="phone"><iframe id="browse" src="QA Prep Prototype.html" title="QA Prep mobile — Browse"></iframe></div>
  </div>
</div>
<script>
  // Best-effort: land each frame on a distinct screen once it's interactive.
  function nav(id, label) {
    const fr = document.getElementById(id);
    let tries = 0;
    const t = setInterval(() => {
      tries++;
      try {
        const doc = fr.contentDocument;
        const btns = doc && doc.querySelectorAll('.topnav button');
        if (btns && btns.length) {
          [...btns].find(b => b.textContent.trim().startsWith(label))?.click();
          clearInterval(t);
        }
      } catch (e) { /* still loading */ }
      if (tries > 80) clearInterval(t);
    }, 150);
  }
  nav('home', 'Home');
  nav('browse', 'Browse');
</script>
</body>
</html>
